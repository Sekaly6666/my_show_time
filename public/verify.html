<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification Billet - MyShowTime</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f0f1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .ticket { width: 100%; max-width: 500px; background: #fff; color: #1e1b4b; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .header { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; padding: 25px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        .content { padding: 25px; }
        .concert-title { font-size: 24px; font-weight: 700; color: #4338ca; margin-bottom: 5px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; padding: 20px 0; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .info-item label { display: block; font-size: 10px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; margin-bottom: 4px; }
        .info-item span { font-weight: 600; font-size: 14px; }
        .status-section { text-align: center; padding: 20px; background: #f0fdf4; border-radius: 12px; border: 2px dashed #22c55e; }
        .status-badge { color: #15803d; font-weight: 800; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .status-badge svg { width: 24px; height: 24px; }
        .footer { padding: 15px; font-size: 11px; color: #94a3b8; text-align: center; }
        .error-box { text-align: center; padding: 40px; }
        .error-box h2 { color: #ef4444; }
        .loading { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(99,52,255,0.1); border-left-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app" class="ticket">
        <div class="loading">
            <div class="spinner"></div>
            <p style="color:#1e1b4b">Vérification de l'authenticité...</p>
        </div>
    </div>

    <script src="/config.js"></script>
    <script>
        const API_BASE_URL = (window.MY_SHOW_TIME_API_BASE_URL || '').replace(/\/$/, '');
        async function verify() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const app = document.getElementById('app');

            if (!code) {
                app.innerHTML = '<div class="error-box"><h2>Lien invalide</h2><p>Aucun code de vérification trouvé.</p></div>';
                return;
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/bookings/code/${code}`);
                if (!response.ok) throw new Error('Billet non trouvé');
                const booking = await response.json();

                if (booking.status !== 'validated') {
                    app.innerHTML = `
                        <div class="error-box">
                            <h2 style="color:#f59e0b">Billet non validé</h2>
                            <p>Ce billet existe mais n'a pas encore été validé par l'administration.</p>
                        </div>
                    `;
                    return;
                }

                app.innerHTML = `
                    <div class="header"><h1>BILLET AUTHENTIQUE</h1></div>
                    <div class="content">
                        <div class="concert-title">${booking.concert.title}</div>
                        <div class="info-item" style="margin-bottom:15px">
                            <label>Artiste</label>
                            <span style="font-size:18px">${booking.concert.groupName}</span>
                        </div>
                        <div class="info-grid">
                            <div class="info-item"><label>Détenteur</label><span>${booking.user.name}</span></div>
                            <div class="info-item"><label>Code</label><span>${booking.bookingCode}</span></div>
                            <div class="info-item"><label>Lieu</label><span>${booking.concert.venue}</span></div>
                            <div class="info-item"><label>Date</label><span>${new Date(booking.concert.date).toLocaleDateString('fr-FR')}</span></div>
                            <div class="info-item"><label>Places</label><span>${booking.quantity}</span></div>
                            <div class="info-item"><label>Prix</label><span>${booking.totalPrice.toLocaleString()} FCFA</span></div>
                        </div>
                        <div class="status-section">
                            <div class="status-badge">
                                <svg fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                                BILLET VALIDÉ
                            </div>
                            <p style="margin: 5px 0 0; font-size: 12px; color: #15803d; opacity: 0.8;">Vérification réussie - Accès autorisé</p>
                        </div>
                    </div>
                    <div class="footer">MyShowTime Security System — ${new Date().toLocaleString()}</div>
                `;
            } catch (err) {
                app.innerHTML = '<div class="error-box"><h2>Billet Invalide</h2><p>Ce code ne correspond à aucune réservation valide dans notre système.</p></div>';
            }
        }
        verify();
    </script>
</body>
</html>
